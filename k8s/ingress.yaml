apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onlineshop-ingress
spec:
  rules:
  - host: onlineshop.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: onlineshop-service
            port:
              number: 80